<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ZENITH | Multi-Route Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.6);
      --bg-deep: #030405;
      --bg-surface: #0a0c0e;
      --bg-elevated: #121518;
      --text-main: #ffffff;
      --text-dim: #8b9bb4;
      --border-light: rgba(255, 255, 255, 0.1);
      --error-red: #ff4d4d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- TOP NAV --- */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 90px; z-index: 5000;
      display: flex; align-items: center; padding: 0 4%;
      background: linear-gradient(to bottom, var(--bg-deep) 70%, transparent);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border-light);
    }

    .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; flex: 0 0 180px; }
    .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

    .search-container { flex: 1; display: flex; justify-content: center; }
    .search-wrapper { position: relative; width: 100%; max-width: 550px; }
    
    #globalSearch {
      width: 100%; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--border-light);
      padding: 14px 25px 14px 50px; border-radius: 12px; color: white; font-size: 1rem;
      font-family: inherit; outline: none; transition: all 0.3s;
    }
    .search-wrapper::before { content: '🔍'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 1rem; opacity: 0.5; }
    #globalSearch:focus { border-color: var(--accent); background: rgba(0, 229, 255, 0.03); box-shadow: 0 0 30px var(--accent-glow); }

    /* --- HERO --- */
    #hero { position: relative; height: 90vh; width: 100%; display: flex; align-items: flex-end; padding: 0 5% 220px; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center 20%; z-index: -2; opacity: 0; transition: opacity 1.2s ease; transform: scale(1.05); }
    .hero-bg.active { opacity: 1; animation: slowZoom 20s linear infinite alternate; }
    #heroVignette { position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg-deep) 0%, transparent 60%), radial-gradient(circle at center, transparent 30%, var(--bg-deep) 100%); z-index: -1; }
    
    .hero-content { max-width: 700px; z-index: 10; transition: 0.6s; }
    .hero-content.fade-out { opacity: 0; transform: translateY(20px); }
    #heroTitle { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
    #heroOverview { color: var(--text-dim); margin-bottom: 2rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* --- MARQUEE --- */
    .marquee-container { position: absolute; bottom: 40px; left: 0; width: 100%; height: 130px; overflow: hidden; z-index: 20; mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
    .marquee-track { display: flex; gap: 15px; width: max-content; animation: scrollLeft 60s linear infinite; padding: 10px 0; }
    .marquee-item { width: 180px; height: 100px; border-radius: 10px; background-size: cover; cursor: pointer; border: 2px solid transparent; transition: 0.4s; opacity: 0.4; }
    .marquee-item.active { opacity: 1; border-color: var(--accent); transform: scale(1.08); }

    /* --- GRID --- */
    .section-header { padding: 40px 5% 0; max-width: 1600px; margin: 0 auto; }
    #gridTitle { font-size: 1.5rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

    #main { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; padding: 40px 5% 100px; max-width: 1600px; margin: 0 auto; }
    .card { position: relative; border-radius: 15px; overflow: hidden; background: var(--bg-surface); cursor: pointer; transition: 0.4s; border: 1px solid var(--border-light); }
    .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .card-info { position: absolute; bottom: 0; width: 100%; padding: 20px 10px 10px; background: linear-gradient(to top, black, transparent); }

    /* --- MODALS --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 6000; opacity: 0; transition: 0.4s; padding: 20px; }
    .modal-overlay.show { opacity: 1; display: flex; }
    
    .selection-box { background: var(--bg-surface); width: 100%; max-width: 450px; padding: 40px; border-radius: 25px; border: 1px solid var(--border-light); text-align: center; }
    
    /* --- PLAYER BOX & FS OVERRIDES --- */
    .player-box { width: 100%; max-width: 1200px; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-light); transition: 0.3s; }
    .player-head { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-elevated); border-bottom: 1px solid var(--border-light); }
    
    /* Google Sites Faux-Fullscreen State */
    .player-box.fs-active { position: fixed; inset: 0; max-width: 100vw; height: 100vh; border-radius: 0; border: none; z-index: 9999; }
    .player-box.fs-active .player-head { display: none; }
    .player-box.fs-active iframe { height: 100vh; aspect-ratio: auto; }

    /* The Invisible Top-Edge Trigger Zone */
    #fsHoverZone {
      position: fixed; top: 0; left: 0; right: 0; height: 150px; 
      z-index: 10000; display: none; cursor: default;
    }

    /* Floating Exit Button for Fullscreen */
    #fsExitBtn {
      position: fixed; top: 25px; right: 25px; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(10, 12, 14, 0.8); border: 2px solid rgba(255,255,255,0.2); color: white;
      font-size: 1.5rem; font-weight: bold; cursor: pointer; display: none; align-items: center; justify-content: center;
      z-index: 10001; backdrop-filter: blur(10px); transition: opacity 0.4s ease, transform 0.2s;
    }
    #fsExitBtn:hover { transform: scale(1.1); background: var(--error-red); border-color: var(--error-red); }

    .source-switcher { display: flex; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 100px; border: 1px solid var(--border-light); gap: 5px; }
    .source-btn { padding: 6px 15px; border-radius: 100px; font-size: 0.75rem; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; color: var(--text-dim); background: transparent; }
    .source-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
    .source-btn.active.stable { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

    iframe { width: 100%; aspect-ratio: 16/9; border: none; background: #000; display: block; }

    .btn-play { background: var(--text-main); color: #000; padding: 14px 32px; border-radius: 100px; border: none; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-play:hover { transform: scale(1.05); background: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }

    #disclaimer { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }

    @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
    @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="logo" onclick="location.reload()">ZENITH<span>.</span></div>
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="globalSearch" placeholder="SEARCH THE ARCHIVES..." autocomplete="off">
      </div>
    </div>
    <div style="flex: 0 0 180px;"></div>
  </nav>

  <div id="disclaimer">
    <div style="text-align:center;">
      <h1 style="font-weight:900; font-size: 3rem; margin-bottom: 20px;">ZENITH<span>.</span></h1>
      <h1 style="font-weight:900; font-size: 1rem; margin-bottom: 20px;">Zenith Movies is simply a wrapper for thrid part media sites. Zenith does NOT host any media.<span>.</span></h1>
      <button onclick="init()" class="btn-play">INITIALIZE STREAM</button>
    </div>
  </div>

  <div id="hero">
    <div id="heroBg1" class="hero-bg active"></div>
    <div id="heroBg2" class="hero-bg"></div>
    <div id="heroVignette"></div>
    <div class="hero-content" id="heroContent">
      <h1 id="heroTitle">--</h1>
      <p id="heroOverview">--</p>
      <button class="btn-play" id="heroPlayBtn">WATCH NOW</button>
    </div>
    <div class="marquee-container"><div class="marquee-track" id="marqueeTrack"></div></div>
  </div>

  <div class="section-header"><h2 id="gridTitle">Trending Now</h2></div>
  <div id="main"></div>

  <div id="selectionModal" class="modal-overlay">
    <div class="selection-box">
      <h2 id="selTitle" style="margin-bottom:20px;">Series</h2>
      <select id="seasonSelect" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; background:var(--bg-elevated); color:white; border:1px solid var(--border-light); font-family:inherit;"></select>
      <select id="episodeSelect" style="width:100%; padding:15px; margin-bottom:30px; border-radius:10px; background:var(--bg-elevated); color:white; border:1px solid var(--border-light); font-family:inherit;"></select>
      <div style="display:flex; gap:10px;">
        <button onclick="hideModal('selectionModal')" style="flex:1; background:transparent; color:white; border:none; cursor:pointer;">CANCEL</button>
        <button id="confirmBtn" class="btn-play" style="flex:2;">INITIALIZE</button>
      </div>
    </div>
  </div>

  <div id="playerModal" class="modal-overlay">
    <div class="player-box" id="pBox">
      <div class="player-head">
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="pTitle" style="font-weight:800; font-size:0.9rem; color:var(--accent);">ZENITH PLAYER</span>
            <div class="source-switcher">
                <button id="srcTexas" class="source-btn active" onclick="switchRoute('texas')">TURBO (FAST)</button>
                <button id="srcVercel" class="source-btn" onclick="switchRoute('vercel')">STABLE (FAILSAFE)</button>
            </div>
        </div>
        <div>
            <button onclick="enterFauxFullscreen()" style="background:transparent; color:white; border:none; cursor:pointer; font-weight:800; margin-right: 15px;">[FULLSCREEN]</button>
            <button onclick="hideModal('playerModal')" style="background:transparent; color:white; border:none; cursor:pointer; font-weight:800;">CLOSE [X]</button>
        </div>
      </div>
      <iframe id="playerIframe" allowfullscreen></iframe>
      
      <div id="fsHoverZone" onmousemove="wakeUpFullscreenUI()"></div>
      <button id="fsExitBtn" onclick="exitFauxFullscreen()">✕</button>
    </div>
  </div>

  <script>
    const API_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
    const baseURL = 'https://api.themoviedb.org/3';
    let trending = [], curHero = 0, activeBg = 1, heroTimer, popularCache = [];
    
    // Routing Logic
    let currentMedia = { id: '', type: '', s: '', e: '' };
    const routes = { texas: "https://movies.texas-projects.xyz/", vercel: "https://zenith-movies.vercel.app/" };
    let activeRoute = 'texas';

    async function init() {
      document.getElementById('disclaimer').style.display = 'none';
      const res = await fetch(`${baseURL}/trending/all/day?api_key=${API_KEY}`);
      const data = await res.json();
      trending = data.results.filter(i => i.backdrop_path).slice(0, 10);
      
      buildMarquee();
      updateHero(0, true);
      startHeroTimer();
      
      const [m, t] = await Promise.all([
        fetch(`${baseURL}/movie/popular?api_key=${API_KEY}`).then(r => r.json()),
        fetch(`${baseURL}/tv/popular?api_key=${API_KEY}`).then(r => r.json())
      ]);
      popularCache = [...m.results.map(i=>({...i, media_type:'movie'})), ...t.results.map(i=>({...i, media_type:'tv'}))].sort(()=>Math.random()-0.5);
      render(popularCache);

      let sT;
      document.getElementById('globalSearch').addEventListener('input', (e) => {
        clearTimeout(sT);
        const q = e.target.value.trim();
        if(!q) { render(popularCache, false); document.getElementById('gridTitle').textContent = "Trending Now"; return; }
        sT = setTimeout(async () => {
          document.getElementById('gridTitle').textContent = `Results: ${q}`;
          const r = await fetch(`${baseURL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);
          const d = await r.json();
          render(d.results.filter(i => i.poster_path), false);
          document.querySelector('.section-header').scrollIntoView({behavior:'smooth'});
        }, 500);
      });
    }

    function startHeroTimer() { clearInterval(heroTimer); heroTimer = setInterval(() => updateHero((curHero + 1) % trending.length), 5000); }

    function buildMarquee() {
      const track = document.getElementById('marqueeTrack');
      [...trending, ...trending].forEach((item, i) => {
        const el = document.createElement('div');
        el.className = `marquee-item ${i % trending.length === 0 ? 'active' : ''}`;
        el.style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${item.backdrop_path})`;
        el.onclick = () => { updateHero(i % trending.length); startHeroTimer(); };
        el.dataset.idx = i % trending.length;
        track.appendChild(el);
      });
    }

    function updateHero(idx, init = false) {
      if (!init && idx === curHero) return;
      curHero = idx;
      const item = trending[idx];
      const content = document.getElementById('heroContent');
      if (!init) content.classList.add('fade-out');
      document.querySelectorAll('.marquee-item').forEach(el => el.classList.toggle('active', parseInt(el.dataset.idx) === idx));
      const nextBg = activeBg === 1 ? 2 : 1;
      const bgEl = document.getElementById(`heroBg${nextBg}`);
      bgEl.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
      bgEl.classList.add('active');
      document.getElementById(`heroBg${activeBg}`).classList.remove('active');
      activeBg = nextBg;
      setTimeout(() => {
        document.getElementById('heroTitle').textContent = item.title || item.name;
        document.getElementById('heroOverview').textContent = item.overview;
        document.getElementById('heroPlayBtn').onclick = () => openRequest(item);
        content.classList.remove('fade-out');
      }, init ? 0 : 500);
    }

    function render(items, append = true) {
      const grid = document.getElementById('main');
      if (!append) grid.innerHTML = '';
      items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animation = `fadeInUp 0.6s ease ${i % 20 * 0.05}s forwards`;
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}"><div class="card-info"><h4>${item.title || item.name}</h4></div>`;
        card.onclick = () => openRequest(item);
        grid.appendChild(card);
      });
    }

    async function openRequest(item) {
      const type = item.media_type || (item.title ? 'movie' : 'tv');
      currentMedia = { id: item.id, type: type, s: '', e: '' };
      
      if (type === 'movie') { launchPlayer(item.title || item.name); } 
      else {
        const res = await fetch(`${baseURL}/tv/${item.id}?api_key=${API_KEY}`);
        const data = await res.json();
        document.getElementById('selTitle').textContent = item.name;
        const sSel = document.getElementById('seasonSelect');
        const eSel = document.getElementById('episodeSelect');
        sSel.innerHTML = data.seasons.filter(s => s.season_number > 0).map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
        const updateEps = async () => {
          const eRes = await fetch(`${baseURL}/tv/${item.id}/season/${sSel.value}?api_key=${API_KEY}`);
          const eData = await eRes.json();
          eSel.innerHTML = eData.episodes.map(e => `<option value="${e.episode_number}">Episode ${e.episode_number}: ${e.name}</option>`).join('');
        };
        sSel.onchange = updateEps;
        await updateEps();
        document.getElementById('confirmBtn').onclick = () => { currentMedia.s = sSel.value; currentMedia.e = eSel.value; launchPlayer(item.name); };
        showModal('selectionModal');
      }
    }

    function launchPlayer(title) {
      document.getElementById('selectionModal').style.display = 'none';
      document.getElementById('selectionModal').classList.remove('show');
      document.getElementById('pTitle').textContent = title.toUpperCase();
      activeRoute = 'texas'; updateIframe();
      showModal('playerModal');
    }

    function updateIframe() {
        const base = routes[activeRoute];
        let url = `${base}?id=${currentMedia.id}`;
        if(currentMedia.type === 'tv') url += `&s=${currentMedia.s}&e=${currentMedia.e}`;
        document.getElementById('playerIframe').src = url;
        document.getElementById('srcTexas').classList.toggle('active', activeRoute === 'texas');
        document.getElementById('srcVercel').classList.toggle('active', activeRoute === 'vercel');
        document.getElementById('srcVercel').classList.toggle('stable', activeRoute === 'vercel');
    }

    function switchRoute(route) { if(activeRoute === route) return; activeRoute = route; updateIframe(); }
    function showModal(id) { const el = document.getElementById(id); el.style.display = 'flex'; setTimeout(() => el.classList.add('show'), 10); }

    function hideModal(id) {
      exitFauxFullscreen(); 
      const el = document.getElementById(id);
      el.classList.remove('show');
      setTimeout(() => { el.style.display = 'none'; if(id === 'playerModal') document.getElementById('playerIframe').src = ''; }, 400);
    }

    /* --- REFINED FULLSCREEN & MOUSE TRACKING --- */
    let fsMouseTimer;
    const fsExitBtn = document.getElementById('fsExitBtn');
    const fsHoverZone = document.getElementById('fsHoverZone');

    function enterFauxFullscreen() {
      document.getElementById('pBox').classList.add('fs-active');
      fsExitBtn.style.display = 'flex';
      fsHoverZone.style.display = 'block'; // Turn on the top-edge sensor
      
      try { document.documentElement.requestFullscreen(); } catch(e){}
      
      document.addEventListener('mousemove', wakeUpFullscreenUI);
      wakeUpFullscreenUI(); 
    }

    function exitFauxFullscreen() {
      document.getElementById('pBox').classList.remove('fs-active');
      fsExitBtn.style.display = 'none';
      fsHoverZone.style.display = 'none'; // Turn off sensor
      
      document.removeEventListener('mousemove', wakeUpFullscreenUI);
      clearTimeout(fsMouseTimer);
      try { if (document.fullscreenElement) document.exitFullscreen(); } catch(e){}
    }

    function wakeUpFullscreenUI() {
      fsExitBtn.style.opacity = '1';
      fsExitBtn.style.pointerEvents = 'auto'; // Re-enable clicking when visible
      
      clearTimeout(fsMouseTimer);
      fsMouseTimer = setTimeout(() => {
        fsExitBtn.style.opacity = '0';
        fsExitBtn.style.pointerEvents = 'none'; // Prevent ghost clicks when hidden
      }, 1500);
    }

    // Bonus: Let the user hit ESC to exit fullscreen safely
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') exitFauxFullscreen();
    });
  </script>
</body>
</html>
